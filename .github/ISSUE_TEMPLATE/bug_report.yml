name: Bug report
description: Report a defect in Free Form Certificate
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections
        below so we can reproduce and fix the issue quickly.

        **Do not report security vulnerabilities here** — use the
        [private security advisory form](https://github.com/rpgmem/ffcertificate/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps that reproduce the problem.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "5.1.0"
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: "6.9"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.1"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Active theme, conflicting plugins, web server, browser if relevant.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Relevant `wp-content/debug.log` excerpts, browser console, or PHP errors.
      render: shell
    validations:
      required: false
