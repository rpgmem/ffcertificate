name: Setup PHP + Composer
description: Install PHP, configure Composer cache, and install dependencies.

inputs:
  php-version:
    description: PHP version to install
    required: true
  coverage:
    description: Coverage driver (none, pcov, xdebug)
    default: none
  ini-values:
    description: Extra php.ini values
    default: ''
  tools:
    description: Extra tools (comma-separated)
    default: composer:v2

runs:
  using: composite
  steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        tools: ${{ inputs.tools }}
        coverage: ${{ inputs.coverage }}
        ini-values: ${{ inputs.ini-values }}

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

    - name: Cache Composer packages
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-php${{ inputs.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-php${{ inputs.php-version }}-

    - name: Install dependencies
      shell: bash
      run: composer install --no-progress --prefer-dist
