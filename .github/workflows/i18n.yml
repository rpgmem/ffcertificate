name: i18n

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.php'
      - 'languages/**'
      - '.github/workflows/i18n.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pot:
    name: Verify ffcertificate.pot is current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: wp-cli
          coverage: none

      - name: Regenerate .pot
        run: |
          wp i18n make-pot . languages/ffcertificate.pot \
            --slug=ffcertificate \
            --domain=ffcertificate \
            --exclude=vendor,node_modules,tests,html,build,dist

      - name: Compare ignoring POT-Creation-Date
        run: |
          # The header timestamp churns every run; strip it before diffing.
          git diff --no-color -- languages/ffcertificate.pot \
            | grep -vE '^[+-]"POT-Creation-Date:' \
            | grep -E '^[+-][^+-]' > /tmp/i18n.diff || true
          if [ -s /tmp/i18n.diff ]; then
            echo "::error::languages/ffcertificate.pot is stale. Regenerate with:"
            echo "  wp i18n make-pot . languages/ffcertificate.pot --slug=ffcertificate --domain=ffcertificate --exclude=vendor,node_modules,tests,html,build,dist"
            echo
            echo "Diff (excluding POT-Creation-Date):"
            cat /tmp/i18n.diff
            exit 1
          fi
          echo "languages/ffcertificate.pot is up to date."
