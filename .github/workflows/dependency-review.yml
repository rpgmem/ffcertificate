name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce dependencies with known high-severity
          # advisories. Lower severities still surface in the PR summary.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
