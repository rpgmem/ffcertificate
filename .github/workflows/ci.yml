name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs everywhere except main (where every commit
  # represents a merged PR we want to keep on the record).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: PHPStan (PHP 8.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-composer
        with:
          php-version: '8.1'
      - name: Run PHPStan
        run: vendor/bin/phpstan analyze

  audit:
    name: Composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none
      - name: Run composer audit
        run: composer audit --locked --no-interaction

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-composer
        with:
          php-version: ${{ matrix.php }}
      - name: Run PHPUnit
        run: vendor/bin/phpunit

  coverage:
    name: Coverage (PHP 8.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Advisory: coverage data is uploaded to Coveralls but does not gate.
    # Promote to required once we have a baseline % to enforce.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-composer
        with:
          php-version: '8.1'
          coverage: pcov
          ini-values: pcov.directory=./includes,pcov.exclude="#(libraries|views)/#",memory_limit=512M
      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage.xml
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          format: clover
          github-token: ${{ secrets.GITHUB_TOKEN }}
