name: CI

on:
  pull_request:
    # `release/**` so 6.6.x hotfix PRs (and any future minor-line
    # maintenance branch) get the same PHPStan + PHPUnit + WPCS +
    # coverage-floor gates as PRs targeting `main`. Without this,
    # hotfix PRs were merging with zero CI signal.
    # `develop` so the batched-release integration branch enforces the
    # same gates per PR — develop must stay deployable to the testes site.
    branches: [main, develop, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHPStan (PHP 8.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-composer
        with:
          php-version: '8.3'
      - name: Run PHPStan
        run: vendor/bin/phpstan analyze

  audit:
    name: Composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Validate composer.json / composer.lock are in sync
        run: composer validate --strict --no-check-publish
      - name: Run composer audit
        # `composer audit` hits packagist.org/api/security-advisories/.
        # That endpoint has occasional 10-second DNS timeouts from
        # GitHub Actions runners (curl error 28). Retry up to 3 times
        # before failing the job — the audit is read-only, retrying
        # is safe.
        run: |
          for attempt in 1 2 3; do
            if composer audit --locked --no-interaction; then
              exit 0
            fi
            echo "::warning::composer audit attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          echo "::error::composer audit failed after 3 attempts"
          exit 1

  test:
    # 6.6.5 — minimum PHP bumped 8.1 → 8.3. Matrix went 4 versions
    # (8.1, 8.2, 8.3, 8.4) → 2 (8.3, 8.4). 8.1 / 8.2 visitors are
    # capped at 6.6.4 by WordPress's `Requires PHP` enforcement.
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-composer
        with:
          php-version: ${{ matrix.php }}
      - name: Run PHPUnit
        run: vendor/bin/phpunit

  # The #563 coverage campaign grew the suite to ~6200 tests, many of them
  # @runTestsInSeparateProcesses (alias-mock containment) — slow under pcov on
  # 2-core runners (the single-process coverage run hit both the 30m timeout and
  # the 512M memory ceiling on #622). The suite was made order-independent
  # (namespaced Core stubs converted to globals so no test leaks a lingering
  # symbol), which lets the coverage run be split into 4 parallel shards. Each
  # shard runs a balanced subset (.github/scripts/shard-tests.php, balanced by
  # process-isolated class count) and emits a partial .cov; the `coverage` job
  # below merges them with phpcov and gates the floor. Wall-clock ~50m → ~15m.
  coverage-shard:
    name: Coverage shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-composer
        with:
          php-version: '8.3'
          coverage: pcov
          ini-values: pcov.directory=./includes,pcov.exclude="#(libraries|views)/#",memory_limit=2G
      - name: Run PHPUnit shard with coverage
        run: |
          mkdir -p build/cov
          php .github/scripts/shard-tests.php ${{ matrix.shard }} 4 > build/phpunit.shard.xml
          vendor/bin/phpunit -c build/phpunit.shard.xml --coverage-php "build/cov/shard-${{ matrix.shard }}.cov"
      - name: Upload shard coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: build/cov/shard-${{ matrix.shard }}.cov
          retention-days: 1

  # Gating job — keeps the exact "Coverage (PHP 8.3)" name the branch protection
  # requires. Runs always() so a shard failure produces a definitive red here
  # (never a skipped required check), then merges the shard .cov files and
  # enforces the floor.
  coverage:
    name: Coverage (PHP 8.3)
    needs: coverage-shard
    # Run on shard success OR failure (so a real shard failure produces a
    # definitive red here), but NOT when the run is cancelled — e.g. a newer
    # push cancels this run via the concurrency group; without this guard the
    # merge job would run and report the cancellation as a spurious failure.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Promoted from advisory to gating in S3 of #161. The floor is set
    # below the current line-coverage baseline so the gate doesn't fire
    # on day one but does catch a regression. Ratchet the floor upward
    # whenever a PR genuinely improves coverage.
    #
    # 50 → 55 in the §7 ratchet (#310) — closes out the #254 §7 test-gap
    # sprint that landed direct unit coverage for the RateLimitLogger /
    # RateLimitStats pair (#311), the ReregistrationSubmissionDetails
    # renderer (#312), the ActivityLogClearPlaintext + EmailHashRehash
    # migration strategies (#313), the 9 Form Editor metaboxes (#315),
    # and the §7.4a Recruitment slice (#316, REST × 4 + trait + Reason
    # repository). Conservative 5pp bump leaves headroom for the
    # in-flight §7.4b (#317) and §7.4c (#318) follow-ups.
    #
    # 55 → 66 — PHP coverage campaign (Fase 1+2): direct unit tests added
    # across the logic layer (self-scheduling CPT/handlers, reregistration
    # email/csv, recruitment csv-importer/dispatcher, audience ajax/admin,
    # repositories, REST controllers, validators, rate-limit, pdf data
    # assembly), skipping HTML-render/markup boilerplate by design. Overall
    # statement coverage 61.17% → 69.82% (31113/44564). Bump to 66 keeps a
    # ~3.8pp buffer under the measured number (≤5pp policy — see CLAUDE.md).
    #
    # 6.12.0 re-measure: 68.05% (30722/45146). The release batch added code
    # (per-module loaders, #600/#601) faster than it added coverage, so the
    # measured number slipped vs the prior run — no real gain to lock in this
    # batch. Floor stays at 66 (now a ~2.05pp buffer, still within the ≤5pp
    # policy); not lowered, not raised above the lowest observed run.
    #
    # 66 → 67 — markup-extraction sweep (#605/#606/#607): the inline admin
    # markup of RecruitmentAdminPageRenderer / UrlShortenerAdminPage /
    # ReregistrationAdminRenderer moved into templates/*.php (out of the
    # coverage scope), removing ~788 uncovered statements from the denominator.
    # Re-measured 69.16% (30676/44358). Bump to 67 locks in the gain with a
    # ~2.16pp buffer (≤5pp policy).
    #
    # 67 → 73 — module coverage sweep (#563): direct unit/render tests lifted
    # every remaining sub-70% module over the line — frontend, url-shortener,
    # settings, self-scheduling, then admin (65.7%→71.1%) and recruitment
    # (56.6%→82.0%) via AJAX-export, REST-controller, list-table, edit-page and
    # renderer coverage. Every includes/ module is now ≥70%. Overall statement
    # coverage 69.16% → 77.96% (34375/44095). Bump to 73 locks in the gain with
    # a ~4.96pp buffer (≤5pp policy).
    #
    # 73 → 78 — push admin + frontend to ≥80% (#563): AJAX-export, list-table,
    # edit-page, render and pipeline-stage tests took admin 71.1%→91.3% and
    # frontend 70.5%→92.4% (both also cleared 90%). Overall statement coverage
    # 77.96% → 82.95% (36579/44095). Bump to 78 locks in the gain with a
    # ~4.95pp buffer (≤5pp policy).
    env:
      COVERAGE_FLOOR_LINES: '78'
    steps:
      - name: Fail if any coverage shard did not succeed
        if: needs.coverage-shard.result != 'success'
        run: |
          echo "::error::One or more coverage shards did not succeed (result=${{ needs.coverage-shard.result }})."
          exit 1
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-composer
        with:
          php-version: '8.3'
          coverage: none
      - name: Download shard coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          path: build/cov
          merge-multiple: true
      - name: Merge shard coverage into clover
        run: vendor/bin/phpcov merge build/cov --clover coverage.xml
      - name: Enforce line-coverage floor
        run: |
          # Parse the project-level <metrics> element from the clover XML
          # and compare `coveredstatements / statements` against the floor.
          php -r '
            $xml = simplexml_load_file("coverage.xml");
            if ( ! $xml ) { fwrite( STDERR, "Failed to parse coverage.xml\n" ); exit( 2 ); }
            $m = $xml->project->metrics;
            $stmts   = (int) $m["statements"];
            $covered = (int) $m["coveredstatements"];
            if ( $stmts === 0 ) { fwrite( STDERR, "No statements recorded\n" ); exit( 2 ); }
            $pct   = ( $covered / $stmts ) * 100;
            $floor = (float) getenv( "COVERAGE_FLOOR_LINES" );
            printf( "Line coverage: %.2f%% (floor: %.2f%%)\n", $pct, $floor );
            // Also emit to the GitHub Actions step summary for at-a-glance review.
            $summary = getenv( "GITHUB_STEP_SUMMARY" );
            if ( $summary ) {
                file_put_contents( $summary, sprintf(
                    "### Coverage\n\n| Lines | %.2f%% |\n| --- | --- |\n| Floor | %.2f%% |\n| Statements | %d / %d |\n",
                    $pct, $floor, $covered, $stmts
                ) );
            }
            if ( $pct < $floor ) {
                fwrite( STDERR, sprintf( "::error::Line coverage %.2f%% is below the floor %.2f%%.\n", $pct, $floor ) );
                exit( 1 );
            }
          '
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          format: clover
          github-token: ${{ secrets.GITHUB_TOKEN }}
