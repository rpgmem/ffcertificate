name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs everywhere except main (where every commit
  # represents a merged PR we want to keep on the record).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: PHPStan (PHP 8.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php8.1-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-php8.1-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run PHPStan
        run: vendor/bin/phpstan analyze

  audit:
    name: Composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none
      - name: Run composer audit
        run: composer audit --locked --no-interaction

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run PHPUnit
        run: vendor/bin/phpunit

  coverage:
    name: Coverage (PHP 8.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Advisory: coverage data is uploaded to Coveralls but does not gate.
    # Promote to required once we have a baseline % to enforce.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: pcov
          ini-values: pcov.directory=./includes,pcov.exclude="#(libraries|views)/#",memory_limit=512M
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php8.1-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-php8.1-
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage.xml
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          format: clover
          # GITHUB_TOKEN is enough for public repos; no Coveralls token needed.
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Stub: branch protection on `main` still references `PHPUnit (PHP 7.4)`
  # as a required check, but PR #15 dropped PHP < 8.1 support. This job
  # exists solely to satisfy the protection rule until repo settings are
  # updated to require the current matrix (PHP 8.1-8.4) instead. Delete
  # this once Settings → Branches → main is reconfigured.
  phpunit-74-shim:
    name: PHPUnit (PHP 7.4)
    runs-on: ubuntu-latest
    steps:
      - name: Skip — PHP 7.4 unsupported since PR #15
        run: |
          echo "::notice::PHP 7.4 was dropped in PR #15 (min is now 8.1). This"
          echo "::notice::stub satisfies the legacy 'PHPUnit (PHP 7.4)' branch"
          echo "::notice::protection requirement. Update Settings → Branches →"
          echo "::notice::main to require PHPUnit (PHP 8.1-8.4) and remove this."
