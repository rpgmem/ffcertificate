name: Lint

on:
  pull_request:
    branches: [main, develop, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: ESLint on assets/js
    runs-on: ubuntu-latest
    # Gating from day one — the codebase has 28 source files and 0 errors
    # after S1 of #161 (only 9 unused-vars warnings remain, which don't gate).
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint:js

  jstest:
    name: Vitest on tests/js
    runs-on: ubuntu-latest
    # Gating from day one — these tests are NEW (no legacy to clean up).
    # They cover the pure helpers in ffc-geofence-frontend.js /
    # ffc-geofence-admin.js shipped via #160 (S2 of #161).
    # Coverage floor enforced in S1 of #163 — see step below.
    env:
      # Ratcheted 3 → 6 → 7 → 15 → 24 → 28 across #163 / #165 / #168 /
      # #170 / #173, then 28 → 34 in Sprint Q of #175, 34 → 47 across
      # #176-#180, 47 → 54 in #183, 54 → 57 in #184, 57 → 64 in #185,
      # 64 → 70 in #186, 70 → 74 in #190 (Sprint F1), 74 → 77 in #199
      # (Sprint F2). The gap-closeout PR for issue #200 covers the two
      # remaining 0% files (ffc-geolocation-settings 0%→100%,
      # ffc-locations-crud 0%→98.94%) plus the Tier-4 backlog
      # (ffc-user-dashboard-core 51%→100%, ffc-custom-fields-admin
      # 49%→100%, ffc-user-dashboard-audience-join 56%→96%,
      # ffc-user-dashboard-appointments 66%→100%), taking overall line
      # coverage to 85.53%. Bumping 77 → 82 locks the gain in with a
      # ~3.5pp buffer. Bump again whenever a PR genuinely improves the
      # number.
      #
      # Held at 82 through the §7 ratchet (#310). #314 added smoke +
      # targeted Vitest coverage for the 6 previously-0% files (calendar
      # admin/frontend, admin-code-editor, admin-pdf, pdf-generator,
      # user-dashboard-cal-export) — but smoke tier only, and overall
      # measured 85.16% locally (below the #200 high-water-mark of
      # 85.53%). No headroom to bump on JS; wait for §7.4b/c follow-ups
      # or a dedicated JS-deep PR before ratcheting again.
      JS_COVERAGE_FLOOR_LINES: '82'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest with coverage
        run: npm run test:js:coverage
      - name: Enforce JS line-coverage floor
        run: |
          # Parse the project-level <metrics> from Vitest's clover output and
          # compare coveredstatements / statements against the floor. Same
          # shape as the PHP gate in ci.yml.
          node -e '
            const fs = require("node:fs");
            const xml = fs.readFileSync("coverage-js/clover.xml", "utf8");
            const m = xml.match(/<metrics[^>]*statements="(\d+)"[^>]*coveredstatements="(\d+)"/);
            if ( ! m ) { console.error("Failed to parse coverage-js/clover.xml"); process.exit(2); }
            const [ , stmts, covered ] = m;
            const pct = ( +covered / +stmts ) * 100;
            const floor = +process.env.JS_COVERAGE_FLOOR_LINES;
            console.log(`JS line coverage: ${pct.toFixed(2)}% (floor: ${floor.toFixed(2)}%)`);
            const summary = process.env.GITHUB_STEP_SUMMARY;
            if ( summary ) {
                fs.appendFileSync(summary,
                    `### JS Coverage\n\n| Lines | ${pct.toFixed(2)}% |\n| --- | --- |\n| Floor | ${floor.toFixed(2)}% |\n| Statements | ${covered} / ${stmts} |\n`);
            }
            if ( pct < floor ) {
                console.error(`::error::JS line coverage ${pct.toFixed(2)}% is below the floor ${floor.toFixed(2)}%.`);
                process.exit(1);
            }
          '

  css:
    name: Stylelint on assets/css
    runs-on: ubuntu-latest
    # Was an `npm run lint:css` script with no CI surface. Promoted to a
    # gated job in S4-extras of #161. If it surfaces a wave of legacy
    # violations, drop to non-gating via `continue-on-error: true` and
    # chip away — the script and config are correct, only the policy
    # changes.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Stylelint
        run: npm run lint:css
